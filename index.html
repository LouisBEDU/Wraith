<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/wraith.svg" />
  <title>%VITE_APP_NAME%</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background-color: #faf9f6; }
    #root { height: 100vh; }

    .app-boot {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background-color: #faf9f6;
    }
    .app-boot__logo {
      width: 60px;
      height: 60px;
      animation: app-boot-pulse 1.4s ease-in-out infinite;
    }
    .app-boot__spinner {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 3px solid #e6e6e9;
      border-top-color: #2f5fe0;
      animation: app-boot-spin 0.7s linear infinite;
    }
    @keyframes app-boot-spin { to { transform: rotate(360deg); } }
    @keyframes app-boot-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
  </style>
</head>

<body>
  <div id="root">
    <div class="app-boot">
      <img class="app-boot__logo" src="/wraith.svg" alt="Wraith" />
      <div class="app-boot__spinner"></div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
